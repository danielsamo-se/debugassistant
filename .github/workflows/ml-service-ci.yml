name: ML Service CI

on:
  push:
    branches: [main]
    paths:
      - 'ml-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'ml-service/**'
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ml-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace model (all-MiniLM-L6-v2)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: huggingface-all-MiniLM-L6-v2

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app/

      - name: Run tests
        run: pytest tests/ -v
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
