name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Checkstyle (Google Style)
        run: ./mvnw checkstyle:check --no-transfer-progress

      - name: Run tests
        run: ./mvnw test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
